name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'public/**'
      - 'ios-app/**'
      - '.github/workflows/build-ios-ipa.yml'

jobs:
  ipa:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ios-app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ios-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Sync web assets
        run: npm run sync

      - name: Add iOS platform
        run: npx cap add ios

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Build unsigned IPA
        run: bash scripts/build-ipa.sh

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: rybnoe-mesto-ipa
          path: ios-app/build/rybnoe-mesto.ipa
          retention-days: 30
